<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Explore – Hand</title>
  <meta name="description" content="Fine art work 'Hand' by Anifou – a myopia simulation capturing the invisible spaces and quiet secrets of urban life. Edition 1/5." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_werke.css') }}">
</head>
<body>

  <a class="back-link" href="/">Back</a>

  <div class="page-wrapper">
    <div class="explore-container">
      <div class="image-block">
        <img id="mainImage" src="{{ url_for('static', filename='projects/drei_komma_5/img/galerie/desktop/IMG_Hand.jpg') }}" alt="Hand Werk" />
      </div>

      <div class="info-block">
        <h1>Hand</h1>
        <p><span class="label">Location:</span> Rio de Janeiro, Brazil</p>
        <p><span class="label">Technique:</span> Myopia Simulation</p>
        <p><span class="label">Format:</span> 66.3 × 100 cm </p>
        <p><span class="label">Print:</span> Fine Art Giclée on Hahnemühle Photo Rag</p>
        <p><span class="label">Edition:</span> 1/5</p>
        <p>
          A moment on invisible spaces – and secrets of urban life.
        </p>
        <p>
          <a class="pdf-link" href="{{ url_for('static', filename='reports/Projektbericht.pdf') }}" target="_blank" rel="noopener noreferrer">
            Report (DE | EN)
          </a>
        </p>
      </div>
    </div>

    <div class="nav-buttons">
      <a class="nav-left" href="/galerie/delphi" aria-label="Vorheriges Bild">&#8592;</a>
      <a class="nav-right" href="/galerie/2brothers" aria-label="Nächstes Bild">&#8594;</a>
    </div>

    <a href="/galerie" class="back-button">Back to Gallery</a>
  </div>

  <div id="imageOverlay">
    <button id="closeOverlay" aria-label="Schließen">&times;</button>
    <img id="overlayImage" src="" alt="Vergrößertes Bild" />
  </div>

  <script>
    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") {
        window.location.href = "/galerie/delphi";
      }
      if (event.key === "ArrowRight") {
        window.location.href = "/galerie/2brothers";
      }
    });

    const mainImage = document.getElementById('mainImage');
    const imageOverlay = document.getElementById('imageOverlay');
    const overlayImage = document.getElementById('overlayImage');
    const closeOverlay = document.getElementById('closeOverlay');

    mainImage.addEventListener('click', () => {
      overlayImage.src = mainImage.src;
      imageOverlay.style.display = 'flex';
    });

    closeOverlay.addEventListener('click', () => {
      imageOverlay.style.display = 'none';
    });

    imageOverlay.addEventListener('click', (e) => {
      if (e.target === imageOverlay) {
        imageOverlay.style.display = 'none';
      }
    });
  </script>
</body>
</html>
